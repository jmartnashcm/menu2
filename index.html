<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHÀ HÀNG HÀ NỘI 1983</title>
    <link rel="icon" href="https://i.ibb.co/s9p8Tx5D/1983.png" type="image/png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f5f5f7;
            /* Khóa cuộn trang của body để khách chỉ lướt lật sách, không bị cuộn web đi chỗ khác */
            overflow-x: hidden; 
        }
        .menu-container {
            width: 100%;
            max-width: 1000px; /* Mở rộng khung ra một chút để cuốn sách hiển thị to rõ hơn */
            margin: 20px auto;
            background-color: transparent;
            padding: 0 15px; /* Thêm khoảng lùi để trên điện thoại không bị sát mép màn hình */
        }
        
        /* CSS cho khung chứa sách Heyzine */
        .flipbook-wrapper {
            width: 100%;
            height: 80vh; /* Sách sẽ chiếm 80% chiều cao màn hình */
            min-height: 500px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .flipbook-iframe {
            width: 100%;
            height: 100%;
            border: none; /* Bỏ viền mặc định xấu xí của iframe */
        }
        
        .promo-btn {
            display: block;
            text-align: center;
            background-color: #ff3b30;
            color: white;
            text-decoration: none;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .promo-btn:hover {
            background-color: #d63026;
        }

        /* --- CSS CHO CỤM NÚT LIÊN HỆ Ở CUỐI TRANG --- */
        .contact-wrapper {
            display: flex;
            flex-direction: row; /* Dàn 2 nút nằm ngang trên máy tính */
            justify-content: space-between;
            gap: 15px; /* Khoảng cách giữa 2 nút */
            margin-top: 15px;
            margin-bottom: 30px;
        }

        /* Khi màn hình điện thoại quá nhỏ, 2 nút sẽ tự động xếp dọc */
        @media (max-width: 500px) {
            .contact-wrapper {
                flex-direction: column;
            }
        }

        .contact-btn {
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            flex: 1; /* Ép 2 nút dài bằng nhau */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s, background-color 0.3s;
        }
        .contact-btn:hover {
            transform: translateY(-3px); /* Hiệu ứng nảy lên nhẹ khi khách rê chuột vào */
        }
        
        .btn-call { background-color: #27ae60; }
        .btn-call:hover { background-color: #219653; }
        .btn-zalo { background-color: #0068ff; }
        .btn-zalo:hover { background-color: #0055d4; }
    </style>
</head>
<body>

    <div class="menu-container">
        
        <div class="flipbook-wrapper">
            <iframe class="flipbook-iframe" src="https://heyzine.com/flip-book/95afe97238.html" allowfullscreen="true" scrolling="no"></iframe>
        </div>
        
        <a href="https://jmarthcm.com/" class="promo-btn" target="_blank">Nhấn vào đây để nhận nhiều ưu đãi khác</a>

        <div class="contact-wrapper">
            <a href="tel:0336346346" class="contact-btn btn-call">📞 LIÊN HỆ ĐẶT BÀN 0336.346.346</a>
            <a href="https://zalo.me/0336346346" target="_blank" class="contact-btn btn-zalo">💬 Zalo: 0336.346.346</a>
        </div>
